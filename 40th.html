<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Document</title>
    <style>
    div{
        width:100px;height:100px;background-color: aqua;
        transition-property:all;
        transition-duration: 5s;
        transition-timing-function: ease-in;  /*ease in matlab slow se fast and ease in out matlab slow fast slow*/
        transition-delay: 3s;
    }
    p:hover{
        width: 300px;
        height:300px;
        box-shadow: 5px 5px 5px 5px rgb(242, 200, 73),15px 15px 15px blue;
        border-radius:50%;
    }
    p:active{
        background-color: yellow;
        transform: rotate(45deg);
    } 
        
        
    </style>
</head>
<body>
    <div>hello</div>
    <p>hello</p>

</body>
</html>
