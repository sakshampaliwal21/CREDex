<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: blue;
            transition: width;
            transition-duration: 4s;
            transition-timing-function: ease-in-out; /*ease-in-out, ease-in, ease-out, linear*/

        }
        .box:hover{
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>
